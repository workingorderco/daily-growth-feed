name: Build daily feed (07:00 UTC)

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build content.json
        run: python scripts/build_feed.py

      - name: Commit + push content.json
        run: |
          git config user.name "daily-growth-feed-bot"
          git config user.email "bot@users.noreply.github.com"
          git add content.json
          git commit -m "daily update" || echo "No changes"
          git push
